name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  github-release:
    name: Create GitHub release
    runs-on: ubuntu-latest

    steps:
      - name: Check version tag
        id: tag
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          semver_pattern='^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z]+([.-][0-9A-Za-z]+)*)?(\+[0-9A-Za-z]+([.-][0-9A-Za-z]+)*)?$'

          if [[ ! "$tag" =~ $semver_pattern ]]; then
            echo "valid=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Release skipped::Tag '$tag' is not a version tag like v0.1.0."
            exit 0
          fi

          echo "valid=true" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

          if [[ "$tag" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "prerelease=false" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: steps.tag.outputs.valid == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          TAG_NAME: ${{ steps.tag.outputs.tag }}
          IS_PRERELEASE: ${{ steps.tag.outputs.prerelease }}
        shell: bash
        run: |
          args=(
            release create "$TAG_NAME"
            --repo "$REPOSITORY"
            --verify-tag
            --title "$TAG_NAME"
            --generate-notes
          )

          if [[ "$IS_PRERELEASE" == "true" ]]; then
            args+=(--prerelease)
          fi

          gh "${args[@]}"
